# Supabase Self-Hosted — 完整 Docker Compose
# 服务: PostgreSQL + REST API + Auth + Storage + Studio (管理面板) + Kong (网关)
#
# 所有服务统一暴露在 :8000 端口
# 启动后访问: http://your-server:8000 → Studio 管理面板
#
# 启动步骤:
#   1. vim .env   (修改密码和密钥)
#   2. docker compose up -d
#   3. http://your-server:8000  打开 Studio
#   4. API URL = http://your-server:8000, anon key 在 Studio → Project Settings → API 中查看
#   5. 在 Studio SQL Editor 中依次执行 ../migrations/ 下的 SQL 文件

version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.075
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── REST API (PostgREST) ────────────────────────────────────
  rest:
    image: postgrest/postgrest:v14.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?required}
    command: postgrest /etc/postgrest.conf

  # ─── Auth (GoTrue) ───────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.178.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:?required}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mail}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: Studio
      GOTRUE_SMTP_MAX_FREQUENCY: 1s

  # ─── Storage ─────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.25.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    volumes:
      - storage_data:/var/lib/storage
    environment:
      ANON_KEY: ${ANON_KEY:?required}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:?required}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:?required}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 10485760
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub

  # ─── Studio (Web 管理面板) ────────────────────────────────────
  studio:
    image: supabase/studio:2025.04.14-sha-28e2f19
    restart: unless-stopped
    depends_on:
      - rest
      - auth
      - meta
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

  # ─── Meta (数据库元信息，Studio 用) ─────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.88.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ─── Kong API Gateway ────────────────────────────────────────
  kong:
    image: kong:3.9.0
    restart: unless-stopped
    depends_on:
      - rest
      - auth
      - storage
      - studio
      - meta
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml

  # ─── Mail (开发用邮件接收器) ───────────────────────────────────
  mail:
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - "${MAIL_UI_PORT:-9000}:9000"
    volumes:
      - mail_data:/var/lib/inbucket

volumes:
  pgdata:
  storage_data:
  mail_data:
