# Kong 路由配置 — 把不同微服务的请求路由到正确的容器
_format_version: "3.0"
_transform: true

services:
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest
        paths: ["/rest/v1"]
        strip_path: false
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth
        paths: ["/auth/v1"]
        strip_path: false
  - name: storage
    url: http://storage:5000
    routes:
      - name: storage
        paths: ["/storage/v1"]
        strip_path: false
  - name: studio
    url: http://studio:3000
    routes:
      - name: studio
        paths: ["/"]
