# Nginx config — serves static portfolio + proxies API to backend
#
# Files:
#   /opt/studio-portfolio/.output/public/  ← static files (nuxi generate output)
#
# API:
#   /api/* → proxied to localhost:3001 (Express server)

server {
    listen 80;
    server_name 49.232.49.175;

    root /opt/studio-portfolio/.output/public;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # API proxy → Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10m;
    }

    # Uploaded images proxy
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
    }

    # Static assets (hashed filenames, long cache)
    location /_nuxt/ {
        alias /opt/studio-portfolio/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin SPA fallback
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Portfolio fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
