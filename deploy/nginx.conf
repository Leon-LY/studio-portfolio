# Nginx config — Serve the static portfolio generated by `npx nuxi generate`
#
# Deployment flow:
#   1. Set SUPABASE_URL and SUPABASE_ANON_KEY in .env
#   2. npx nuxi generate          → outputs dist/
#   3. rsync dist/ to server      → e.g., /var/www/studio/
#   4. sudo nginx -s reload
#
# The admin SPA (/admin/*) is a client-side Vue app bundled in the dist.
# Auth and API calls go directly from the browser to Supabase (your server:8000).

server {
    listen 80;
    server_name studio.example.com;   # <-- change to your domain

    root /var/www/studio;             # <-- where you rsync dist/ to
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Static assets with long cache (hashed filenames)
    location /_nuxt/ {
        alias /var/www/studio/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin SPA fallback — serve index.html for all admin routes
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Portfolio SPA fallback — serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
